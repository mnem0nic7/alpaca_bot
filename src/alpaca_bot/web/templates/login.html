<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>alpaca_bot sign in</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f0e8;
        --panel: rgba(255, 253, 248, 0.94);
        --line: #d8d2c5;
        --ink: #1d2b2a;
        --muted: #6a736e;
        --accent: #1f6f78;
        --warn: #8f3b2e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        background:
          radial-gradient(circle at top right, rgba(31, 111, 120, 0.12), transparent 28rem),
          linear-gradient(180deg, #f9f6ef 0%, var(--bg) 100%);
        color: var(--ink);
      }
      .panel {
        width: min(100%, 30rem);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 1.4rem;
        box-shadow: 0 18px 40px rgba(29, 43, 42, 0.08);
      }
      h1 {
        margin: 0.2rem 0 0;
        font-size: clamp(1.8rem, 3vw, 2.3rem);
      }
      p { margin: 0; }
      .eyebrow {
        font-size: 0.78rem;
        text-transform: uppercase;
        color: var(--muted);
        letter-spacing: 0.08em;
      }
      .muted {
        color: var(--muted);
        margin-top: 0.75rem;
        line-height: 1.5;
      }
      form {
        display: grid;
        gap: 0.9rem;
        margin-top: 1.3rem;
      }
      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.92rem;
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.75rem 0.85rem;
        font: inherit;
        background: #fffdf8;
        color: var(--ink);
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 0.82rem 1rem;
        font: inherit;
        color: white;
        background: linear-gradient(135deg, #1f6f78 0%, #2d8c86 100%);
        cursor: pointer;
      }
      .error {
        margin-top: 1rem;
        padding: 0.8rem 0.9rem;
        border-radius: 14px;
        border: 1px solid rgba(143, 59, 46, 0.25);
        background: rgba(143, 59, 46, 0.08);
        color: var(--warn);
      }
      .mono {
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">alpaca_bot</p>
      <h1>Sign in</h1>
      <p class="muted">
        Enter the dashboard operator credentials to view the read-only runtime panel for
        <span class="mono">{{ trading_mode }}</span> /
        <span class="mono">{{ strategy_version }}</span>.
      </p>

      {% if error_message %}
        <p class="error">{{ error_message }}</p>
      {% endif %}

      <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next_path }}" />
        <label>
          Username
          <input type="text" name="username" value="{{ username }}" autocomplete="username" required />
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
