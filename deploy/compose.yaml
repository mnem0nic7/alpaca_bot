volumes:
  postgres_data:

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  supervisor:
    image: alpaca-bot:latest
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import os, time; f='/tmp/supervisor_heartbeat'; exit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<180 else 1)"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    command: ["alpaca-bot-supervisor"]
    depends_on:
      postgres:
        condition: service_healthy
    environment: &alpaca_bot_env
      TRADING_MODE: ${TRADING_MODE}
      ENABLE_LIVE_TRADING: ${ENABLE_LIVE_TRADING}
      STRATEGY_VERSION: ${STRATEGY_VERSION}
      ALPACA_BOT_MIGRATIONS_PATH: /app/migrations
      DATABASE_URL: ${DATABASE_URL}
      MARKET_DATA_FEED: ${MARKET_DATA_FEED}
      SYMBOLS: ${SYMBOLS}
      DAILY_SMA_PERIOD: ${DAILY_SMA_PERIOD}
      BREAKOUT_LOOKBACK_BARS: ${BREAKOUT_LOOKBACK_BARS}
      RELATIVE_VOLUME_LOOKBACK_BARS: ${RELATIVE_VOLUME_LOOKBACK_BARS}
      RELATIVE_VOLUME_THRESHOLD: ${RELATIVE_VOLUME_THRESHOLD}
      BULL_FLAG_MIN_RUN_PCT: ${BULL_FLAG_MIN_RUN_PCT:-0.02}
      BULL_FLAG_CONSOLIDATION_VOLUME_RATIO: ${BULL_FLAG_CONSOLIDATION_VOLUME_RATIO:-0.6}
      BULL_FLAG_CONSOLIDATION_RANGE_PCT: ${BULL_FLAG_CONSOLIDATION_RANGE_PCT:-0.5}
      ENTRY_TIMEFRAME_MINUTES: ${ENTRY_TIMEFRAME_MINUTES}
      ENTRY_ORDER_ACTIVE_BARS: ${ENTRY_ORDER_ACTIVE_BARS:-1}
      RISK_PER_TRADE_PCT: ${RISK_PER_TRADE_PCT}
      MAX_POSITION_PCT: ${MAX_POSITION_PCT}
      MAX_LOSS_PER_TRADE_DOLLARS: ${MAX_LOSS_PER_TRADE_DOLLARS:-}
      MAX_OPEN_POSITIONS: ${MAX_OPEN_POSITIONS}
      MAX_PORTFOLIO_EXPOSURE_PCT: ${MAX_PORTFOLIO_EXPOSURE_PCT:-0.30}
      DAILY_LOSS_LIMIT_PCT: ${DAILY_LOSS_LIMIT_PCT}
      STOP_LIMIT_BUFFER_PCT: ${STOP_LIMIT_BUFFER_PCT}
      BREAKOUT_STOP_BUFFER_PCT: ${BREAKOUT_STOP_BUFFER_PCT}
      ATR_PERIOD: ${ATR_PERIOD:-14}
      ATR_STOP_MULTIPLIER: ${ATR_STOP_MULTIPLIER:-1.0}
      PRIOR_DAY_HIGH_LOOKBACK_BARS: ${PRIOR_DAY_HIGH_LOOKBACK_BARS:-1}
      ORB_OPENING_BARS: ${ORB_OPENING_BARS:-2}
      ORB_RELATIVE_VOLUME_THRESHOLD: ${ORB_RELATIVE_VOLUME_THRESHOLD:-}
      ORB_ATR_STOP_MULTIPLIER: ${ORB_ATR_STOP_MULTIPLIER:-}
      VWAP_REVERSION_RELATIVE_VOLUME_THRESHOLD: ${VWAP_REVERSION_RELATIVE_VOLUME_THRESHOLD:-}
      VWAP_REVERSION_ATR_STOP_MULTIPLIER: ${VWAP_REVERSION_ATR_STOP_MULTIPLIER:-}
      HIGH_WATERMARK_LOOKBACK_DAYS: ${HIGH_WATERMARK_LOOKBACK_DAYS:-252}
      EMA_PERIOD: ${EMA_PERIOD:-9}
      ENTRY_STOP_PRICE_BUFFER: ${ENTRY_STOP_PRICE_BUFFER}
      ENTRY_MIN_CLOSE_TO_ENTRY_PCT: ${ENTRY_MIN_CLOSE_TO_ENTRY_PCT:--0.01}
      ENTRY_MAX_CLOSE_TO_ENTRY_PCT: ${ENTRY_MAX_CLOSE_TO_ENTRY_PCT:-1.0}
      ENTRY_WINDOW_START: ${ENTRY_WINDOW_START}
      ENTRY_WINDOW_END: ${ENTRY_WINDOW_END}
      FLATTEN_TIME: ${FLATTEN_TIME}
      TRAILING_STOP_ATR_MULTIPLIER: ${TRAILING_STOP_ATR_MULTIPLIER:-0.0}
      TRAILING_STOP_PROFIT_TRIGGER_R: ${TRAILING_STOP_PROFIT_TRIGGER_R:-1.0}
      ALPACA_PAPER_API_KEY: ${ALPACA_PAPER_API_KEY}
      ALPACA_PAPER_SECRET_KEY: ${ALPACA_PAPER_SECRET_KEY}
      ALPACA_LIVE_API_KEY: ${ALPACA_LIVE_API_KEY}
      ALPACA_LIVE_SECRET_KEY: ${ALPACA_LIVE_SECRET_KEY}
      ENABLE_PROFIT_TRAIL: ${ENABLE_PROFIT_TRAIL:-false}
      PROFIT_TRAIL_PCT: ${PROFIT_TRAIL_PCT:-0.95}
      ENABLE_PROFIT_TARGET: ${ENABLE_PROFIT_TARGET:-false}
      PROFIT_TARGET_R: ${PROFIT_TARGET_R:-2.0}
      ENABLE_BREAKEVEN_STOP: ${ENABLE_BREAKEVEN_STOP:-true}
      BREAKEVEN_TRIGGER_PCT: ${BREAKEVEN_TRIGGER_PCT:-0.0025}
      BREAKEVEN_TRAIL_PCT: ${BREAKEVEN_TRAIL_PCT:-0.002}
      ENABLE_TREND_FILTER_EXIT: ${ENABLE_TREND_FILTER_EXIT:-false}
      ENABLE_VWAP_BREAKDOWN_EXIT: ${ENABLE_VWAP_BREAKDOWN_EXIT:-false}
      VWAP_BREAKDOWN_MIN_BARS: ${VWAP_BREAKDOWN_MIN_BARS:-1}
      ENABLE_NO_FOLLOW_THROUGH_EXIT: ${ENABLE_NO_FOLLOW_THROUGH_EXIT:-false}
      NO_FOLLOW_THROUGH_EXIT_MINUTES: ${NO_FOLLOW_THROUGH_EXIT_MINUTES:-0}
      NO_FOLLOW_THROUGH_MIN_FAVORABLE_PCT: ${NO_FOLLOW_THROUGH_MIN_FAVORABLE_PCT:-0.0025}
      ENABLE_GIVEBACK_EXIT: ${ENABLE_GIVEBACK_EXIT:-false}
      GIVEBACK_EXIT_MIN_FAVORABLE_PCT: ${GIVEBACK_EXIT_MIN_FAVORABLE_PCT:-0.0025}
      GIVEBACK_EXIT_MAX_RETURN_PCT: ${GIVEBACK_EXIT_MAX_RETURN_PCT:-0.0}
      ENABLE_EARLY_LOSS_EXIT: ${ENABLE_EARLY_LOSS_EXIT:-false}
      EARLY_LOSS_EXIT_MINUTES: ${EARLY_LOSS_EXIT_MINUTES:-0}
      EARLY_LOSS_EXIT_RETURN_PCT: ${EARLY_LOSS_EXIT_RETURN_PCT:-0.01}
      EXTENDED_HOURS_ENABLED: ${EXTENDED_HOURS_ENABLED:-false}
      INTRADAY_DIGEST_INTERVAL_CYCLES: ${INTRADAY_DIGEST_INTERVAL_CYCLES:-0}
      INTRADAY_CONSECUTIVE_LOSS_GATE: ${INTRADAY_CONSECUTIVE_LOSS_GATE:-0}
      PAPER_PROOF_FREEZE: ${PAPER_PROOF_FREEZE:-false}
      PAPER_APPROVED_STRATEGIES: ${PAPER_APPROVED_STRATEGIES:-bull_flag}
      PAPER_APPROVED_STRATEGIES_APPROVAL_MARKER: ${PAPER_APPROVED_STRATEGIES_APPROVAL_MARKER:-/var/lib/alpaca-bot/nightly/second_strategy/promotion_approval.json}
      PAPER_APPROVED_STRATEGIES_APPROVAL_ENV_FILE: ${PAPER_APPROVED_STRATEGIES_APPROVAL_ENV_FILE:-/etc/alpaca_bot/alpaca-bot.env}
      PAPER_SCALE_MIN_TRADES: ${PAPER_SCALE_MIN_TRADES:-30}
      PAPER_SCALE_MIN_STRATEGIES: ${PAPER_SCALE_MIN_STRATEGIES:-2}
      PAPER_SCALE_MIN_ACTIVE_DAYS: ${PAPER_SCALE_MIN_ACTIVE_DAYS:-5}
      PAPER_SCALE_MAX_SINGLE_WIN_PNL_SHARE: ${PAPER_SCALE_MAX_SINGLE_WIN_PNL_SHARE:-0.50}
      PAPER_SCALE_MIN_PROFIT_FACTOR: ${PAPER_SCALE_MIN_PROFIT_FACTOR:-1.20}
      PAPER_SCALE_MAX_EOD_LOSS_SHARE: ${PAPER_SCALE_MAX_EOD_LOSS_SHARE:-0.50}
      PAPER_SCALE_MAX_OPERATIONAL_EXIT_LOSS_SHARE: ${PAPER_SCALE_MAX_OPERATIONAL_EXIT_LOSS_SHARE:-0.00}
      PAPER_EXECUTION_MIN_ENTRY_FILL_RATE: ${PAPER_EXECUTION_MIN_ENTRY_FILL_RATE:-0.25}
      PAPER_EXECUTION_MAX_CAPACITY_REJECT_RATE: ${PAPER_EXECUTION_MAX_CAPACITY_REJECT_RATE:-0.05}
      PAPER_READINESS_DECISION_DRY_RUN_STRATEGIES: ${PAPER_READINESS_DECISION_DRY_RUN_STRATEGIES:-bull_flag}
      PAPER_ACTIVITY_STRATEGIES: ${PAPER_ACTIVITY_STRATEGIES:-bull_flag}
      PAPER_READINESS_MAX_PASS_AGE_MINUTES: ${PAPER_READINESS_MAX_PASS_AGE_MINUTES:-180}
      PROFIT_PROBE_START_DATE: ${PROFIT_PROBE_START_DATE:-2026-07-07}
      PROFIT_PROBE_STRATEGY: ${PROFIT_PROBE_STRATEGY:-bull_flag}
      PROFIT_PROBE_MIN_TRADES: ${PROFIT_PROBE_MIN_TRADES:-30}
      PROFIT_PROBE_MIN_PNL: ${PROFIT_PROBE_MIN_PNL:-0.01}
      PROFIT_PROBE_STRATEGIES: ${PROFIT_PROBE_STRATEGIES:-bull_flag}
      SESSION_GUARD_MIN_TRADES: ${SESSION_GUARD_MIN_TRADES:-10}
      SESSION_GUARD_FAIL_BELOW_PNL: ${SESSION_GUARD_FAIL_BELOW_PNL:-0}
      SESSION_GUARD_STRATEGIES: ${SESSION_GUARD_STRATEGIES:-bull_flag}
      CONFIDENCE_FLOOR: ${CONFIDENCE_FLOOR:-0.25}
      FLOOR_AUTO_RAISE_MAX_AGE_DAYS: ${FLOOR_AUTO_RAISE_MAX_AGE_DAYS:-7}
      ENABLE_OPTIONS_TRADING: ${ENABLE_OPTIONS_TRADING:-false}
      OPTION_CHAIN_SYMBOLS: ${OPTION_CHAIN_SYMBOLS:-}
      OPTION_CHAIN_SNAPSHOT_DIR: ${OPTION_CHAIN_SNAPSHOT_DIR:-}
      OPTION_CHAIN_MIN_TOTAL_VOLUME: ${OPTION_CHAIN_MIN_TOTAL_VOLUME:-0}
      OPTION_STRATEGY_MAX_ROLLING_LOSS_USD: ${OPTION_STRATEGY_MAX_ROLLING_LOSS_USD:-0.0}
      OPTION_STRATEGY_ROLLING_LOSS_DAYS: ${OPTION_STRATEGY_ROLLING_LOSS_DAYS:-7}
      ENABLE_VIX_FILTER: ${ENABLE_VIX_FILTER:-false}
      VIX_PROXY_SYMBOL: ${VIX_PROXY_SYMBOL:-VIXY}
      VIX_LOOKBACK_BARS: ${VIX_LOOKBACK_BARS:-20}
      ENABLE_SECTOR_FILTER: ${ENABLE_SECTOR_FILTER:-false}
      SECTOR_ETF_SYMBOLS: ${SECTOR_ETF_SYMBOLS:-XLK,XLF,XLE,XLV,XLU,XLI,XLB,XLRE,XLC,XLY,XLP}
      SECTOR_ETF_SMA_PERIOD: ${SECTOR_ETF_SMA_PERIOD:-20}
      SECTOR_FILTER_MIN_PASSING_PCT: ${SECTOR_FILTER_MIN_PASSING_PCT:-0.5}
      ENABLE_VWAP_ENTRY_FILTER: ${ENABLE_VWAP_ENTRY_FILTER:-false}
      ENABLE_REGIME_FILTER: ${ENABLE_REGIME_FILTER:-false}
      ENABLE_NEWS_FILTER: ${ENABLE_NEWS_FILTER:-false}
      ENABLE_SPREAD_FILTER: ${ENABLE_SPREAD_FILTER:-false}
      REPLAY_SLIPPAGE_BPS: ${REPLAY_SLIPPAGE_BPS:-5.0}
    volumes:
      - /var/lib/alpaca-bot/option-chain-snapshots:/data/option-chain-snapshots
      - /var/lib/alpaca-bot/nightly/second_strategy:/var/lib/alpaca-bot/nightly/second_strategy:ro

  web:
    image: alpaca-bot:latest
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    command: ["alpaca-bot-web", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *alpaca_bot_env
      DASHBOARD_AUTH_ENABLED: ${DASHBOARD_AUTH_ENABLED:-false}
      DASHBOARD_AUTH_USERNAME: ${DASHBOARD_AUTH_USERNAME:-}
      DASHBOARD_AUTH_PASSWORD_HASH: ${DASHBOARD_AUTH_PASSWORD_HASH:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8080/healthz', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - /var/lib/alpaca-bot/nightly/second_strategy:/var/lib/alpaca-bot/nightly/second_strategy:ro

  # Note: the supervisor self-migrates at startup via bootstrap_runtime → MigrationRunner.apply_all().
  # This service exists for manual one-shot migration runs via deploy.sh (profiles: [ops]).
  # Running Compose with the deployment env file is safe — the supervisor handles migrations.
  migrate:
    image: alpaca-bot:latest
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["alpaca-bot-migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment: *alpaca_bot_env
    profiles: ["ops"]

  admin:
    image: alpaca-bot:latest
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["alpaca-bot-admin"]
    depends_on:
      postgres:
        condition: service_healthy
    environment: *alpaca_bot_env
    volumes:
      - /var/lib/alpaca-bot/option-chain-snapshots:/data/option-chain-snapshots
      - /var/lib/alpaca-bot/nightly/second_strategy:/var/lib/alpaca-bot/nightly/second_strategy:ro
    profiles: ["ops"]

  # Run on-demand: docker compose --env-file /etc/alpaca_bot/alpaca-bot.env -f deploy/compose.yaml run --rm nightly
  # Scheduled by host cron via scripts/install_cron.sh — see deploy/cron.d/alpaca-bot
  nightly:
    image: alpaca-bot:latest
    build:
      context: ..
      dockerfile: Dockerfile
    command:
      - alpaca-bot-nightly
      - --output-dir
      - /data/scenarios
      - --output-env
      - /data/candidate.env
      - --strategies
      - enabled
      - --proof-guard
      - --max-combos
      - ${NIGHTLY_MAX_COMBOS:-24}
    environment: *alpaca_bot_env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/lib/alpaca-bot/nightly:/data
    restart: "no"
    profiles: ["ops"]
